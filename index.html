<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight: 500;
  }
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
    font-weight: 700;
  }
  </style>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1e1e1e;
      --border: #252525;
      --accent: #f0f0f0;
      --accent2: #cccccc;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #606060;
      --red: #ff4444;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'GmarketSans', 'Pretendard', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      filter: invert(1);
    }
    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Scanner View ── */
    #scanner-view {
      display: none;
      flex-direction: column;
      height: calc(100dvh - 97px);
    }
    #scanner-view.active { display: flex; }

    .scanner-container {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 260px;
      height: 160px;
      position: relative;
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-frame > span::before,
    .scan-frame > span::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--accent);
      border-style: solid;
    }
    .scan-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .scan-frame::after  { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .scan-frame > span::before { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .scan-frame > span::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    .scan-line {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanMove 2s ease-in-out infinite;
      top: 0;
    }

    @keyframes scanMove {
      0%   { top: 8px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 8px); opacity: 0; }
    }

    .scan-hint {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.3px;
    }

    .scanner-controls {
      padding: 16px 20px;
      background: var(--bg2);
      display: flex;
      gap: 10px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }
    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
      flex: 1;
    }
    .btn-primary:active { background: var(--accent2); transform: scale(0.98); }
    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:active { background: var(--border); transform: scale(0.98); }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }

    /* ── Search View ── */
    #search-view {
      display: none;
      flex-direction: column;
      height: calc(100dvh - 97px);
    }
    #search-view.active { display: flex; }

    .search-bar {
      padding: 14px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text3); }

    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .result-item:active { background: var(--bg3); border-color: var(--accent); }

    .result-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--bg3);
      flex-shrink: 0;
    }
    .result-thumb-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .result-info { flex: 1; min-width: 0; }
    .result-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-meta {
      font-size: 12px;
      color: var(--text2);
      margin-top: 3px;
    }
    .result-code {
      font-family: 'GmarketSans', 'Pretendard', sans-serif;
      font-size: 11px;
      color: var(--text2);
      margin-top: 3px;
    }
    .result-option {
      font-size: 14px;
      font-weight: 400;
      color: var(--text2);
    }

    .result-arrow {
      color: var(--text3);
      font-size: 16px;
      flex-shrink: 0;
    }

    /* ── Product Detail Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    .modal-backdrop.open .modal {
      transform: translateY(0);
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .modal-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-size: 13px;
      font-family: 'GmarketSans', 'Pretendard', sans-serif;
      color: var(--text2);
      letter-spacing: 0.5px;
    }
    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg3);
      border: none;
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image-wrap {
      width: 100%;
      height: 220px;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .product-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
      transition: opacity 0.15s;
    }
    .product-image-wrap:active img { opacity: 0.8; }
    .product-image-wrap .zoom-hint {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
    }

    /* ── Image Zoom Overlay ── */
    .img-zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .img-zoom-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .img-zoom-overlay img {
      max-width: 92vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      transform: scale(0.92);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .img-zoom-overlay.open img {
      transform: scale(1);
    }
    .product-image-placeholder {
      font-size: 48px;
      opacity: 0.3;
    }

    .product-body { padding: 20px; }

    .product-brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .product-option {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .product-price-small {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 16px;
    }

    .product-price {
      font-family: 'GmarketSans', 'Pretendard', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .info-card {
      background: var(--bg3);
      border-radius: 10px;
      padding: 12px;
    }
    .info-card.full { grid-column: 1 / -1; }
    .info-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 13px;
      font-weight: 500;
      word-break: break-all;
    }
    .info-value.mono {
      font-family: 'GmarketSans', 'Pretendard', sans-serif;
      font-size: 12px;
    }

    .link-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
      color: #0a0a0a;
    }
    .link-btn:active { opacity: 0.8; }
    .link-btn.naver { background: #03c75a; }
    .link-btn.shopify { background: rgb(82, 45, 218); color: #fff; }
    .link-btn.disabled {
      background: var(--bg3);
      color: var(--text3);
      pointer-events: none;
    }
    .link-btn-icon { font-size: 16px; }
    .link-btn-arrow { margin-left: auto; }

    /* ── Empty / Error states ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      gap: 12px;
    }
    .empty-icon { font-size: 40px; opacity: 0.3; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--text2); }
    .empty-desc { font-size: 13px; color: var(--text3); line-height: 1.5; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s;
      z-index: 500;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.success { border-color: var(--accent); color: var(--accent); }

    /* ── Config View ── */
    #config-view {
      display: none;
      padding: 20px 16px;
      flex-direction: column;
      gap: 16px;
    }
    #config-view.active { display: flex; }

    .config-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .config-section-title {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text3);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .config-row {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .config-row:last-child { border-bottom: none; }
    .config-label {
      font-size: 13px;
      font-weight: 500;
    }
    .config-desc { font-size: 12px; color: var(--text2); }
    .config-input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: 'GmarketSans', 'Pretendard', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .config-input:focus { border-color: var(--accent); }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text3);
      margin-right: 6px;
    }
    .status-dot.ok { background: #4caf50; }
    .status-dot.err { background: var(--red); }

    /* ── Loading spinner ── */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scan success flash ── */
    @keyframes flashGreen {
      0%   { box-shadow: inset 0 0 0 3px var(--accent); }
      100% { box-shadow: inset 0 0 0 3px transparent; }
    }
    .scan-success { animation: flashGreen 0.4s ease-out; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- Google Lock Screen -->
<div id="lock-screen">
  <div class="lock-logo">GEON<span>.</span>checker</div>
  <div class="lock-desc">GEONWORKS 계정으로 로그인하세요<br>(@geon.works)</div>
  <div id="g-signin-btn"></div>
  <div class="lock-error" id="lock-error"></div>
</div>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 596 842" xmlns="http://www.w3.org/2000/svg" style="fill:var(--text);flex-shrink:0;" fill-rule="evenodd" clip-rule="evenodd">
      <g transform="translate(-9.3635,-817.6605)">
        <path d="M485.655,1233.52L412.764,1306.41L485.655,1306.41L485.655,1233.52Z"/>
        <path d="M485.655,1091.31L270.556,1306.41L350.053,1385.9L350,1306.41L485.655,1170.75L485.655,1091.31Z"/>
        <path d="M485.655,1379.3L412.764,1306.41L412.764,1385.96L350.053,1448.67L207.791,1306.41L485.655,1028.54L485.655,949.101L128.348,1306.41L350.053,1528.11L485.655,1379.3Z"/>
      </g>
    </svg>
    Geon<span>.</span>checker
  </div>
  <div class="header-right">
    <span id="status-indicator" style="font-size:12px;color:var(--text3);">
      <span class="status-dot" id="conn-dot"></span><span id="conn-text">미연결</span>
    </span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="scanner">📷 스캔</div>
  <div class="tab" data-tab="search">🔍 검색</div>
  <div class="tab" data-tab="config">⚙️ 설정</div>
</div>

<!-- Scanner View -->
<div id="scanner-view" class="view active">
  <div class="scanner-container" id="scanner-container">
    <div id="qr-reader" style="width:100%;height:100%;"></div>
    <div class="scan-overlay" id="scan-overlay">
      <div class="scan-frame">
        <span></span>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scan-hint">바코드 또는 QR코드를 프레임 안에 맞춰주세요</div>
  </div>
  <div class="scanner-controls">
    <button class="btn btn-primary" id="btn-scan">카메라 시작</button>
    <button class="btn btn-secondary" id="btn-torch" style="display:none">💡</button>
  </div>
</div>

<!-- Search View -->
<div id="search-view" class="view">
  <div class="search-bar">
    <input class="search-input" id="search-input" type="search" placeholder="품목명, 품목코드, 바코드 검색..." autocomplete="off" />
    <button class="btn btn-secondary" id="btn-search-go" style="padding:10px 14px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
  <div class="search-results" id="search-results">
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">제품을 검색하세요</div>
      <div class="empty-desc">품목명, 품목코드, 또는<br>바코드로 검색할 수 있어요</div>
    </div>
  </div>
</div>

<!-- Config View -->
<div id="config-view" class="view">
  <div class="config-section">

<script>
const ALLOWED_DOMAIN = 'geon.works';
const CLIENT_ID = '666157816733-0uu1dkoda0ljjslrd479j371snkj62t7.apps.googleusercontent.com';

function initGoogleSignIn() {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: true,
  });
  google.accounts.id.renderButton(
    document.getElementById('g-signin-btn'),
    {
      type: 'standard',
      shape: 'rectangular',
      theme: 'filled_black',
      text: 'signin_with',
      size: 'large',
      locale: 'ko',
    }
  );
  google.accounts.id.prompt();
}

function handleCredentialResponse(response) {
  const payload = parseJwt(response.credential);
  const email = payload.email || '';
  const domain = email.split('@')[1] || '';
  if (domain === ALLOWED_DOMAIN) {
    sessionStorage.setItem('gw-checker-auth', email);
    document.getElementById('lock-screen').style.display = 'none';
  } else {
    document.getElementById('lock-error').textContent =
      `@${ALLOWED_DOMAIN} 계정만 사용할 수 있어요 (현재: ${email})`;
    google.accounts.id.revoke(email, () => {});
  }
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join('')));
}

// 세션 유지 확인
const savedAuth = sessionStorage.getItem('gw-checker-auth');
if (savedAuth && savedAuth.endsWith('@' + ALLOWED_DOMAIN)) {
  document.getElementById('lock-screen').style.display = 'none';
}

window.addEventListener('load', () => {
  if (typeof google !== 'undefined' && google.accounts) {
    initGoogleSignIn();
  } else {
    const gsiScript = document.querySelector('script[src*="gsi/client"]');
    if (gsiScript) gsiScript.addEventListener('load', initGoogleSignIn);
  }
});
</script>
